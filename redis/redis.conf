# Configuração compartilhada pelas duas instâncias Redis de cada nó
# (redis-a @ 6379 e redis-b @ 6380). Port, dir, cluster-config-file e
# pidfile são passados por command-line no docker-compose.redis.yml.

cluster-enabled yes
cluster-node-timeout 500
cluster-require-full-coverage no
cluster-migration-barrier 1

appendonly no
appendfsync no

bind 0.0.0.0
protected-mode no
save ""
